name: Add-on
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add-on linter
        uses: frenck/action-addon-linter@v2
        with:
          path: "./signalbot"
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: signalbot/Dockerfile
          ignore: DL3007,DL3008
